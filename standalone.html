<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brushd - Sydney Painting Quotes</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gold:       #C9962A;
            --gold-light: #E2B84B;
            --gold-dark:  #A07A1E;
            --cream:      #F5F0E8;
            --cream-dark: #EDE6D6;
            --brown-dark: #2A1F0E;
            --text-dark:  #1A1208;
            --text-mid:   #4A3B28;
            --text-light: #7A6B54;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .font-playfair { font-family: 'Playfair Display', serif; }
        
        .aos { 
            opacity: 0; 
            transform: translateY(30px); 
            transition: opacity 0.8s ease-out, transform 0.8s ease-out; 
        }
        .aos.show { 
            opacity: 1; 
            transform: translateY(0); 
        }

        .hero-bg {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1562259949-e8e7689d7828?w=1800&q=80') center center/cover no-repeat;
        }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(12,8,2,0.6) 0%, rgba(12,8,2,0.5) 55%, rgba(12,8,2,0.7) 100%);
        }

        .btn-gold {
            background: var(--gold);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(201, 150, 42, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--cream); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion (Motion) CDN -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- COMPONENTS ---

        const Navbar = ({ isScrolled, navigateTo, currentPage, setIsMenuOpen }) => {
            return (
                <nav className={`fixed top-0 left-0 right-0 z-[200] h-[66px] flex items-center justify-between px-6 md:px-12 transition-all duration-300 ${
                    isScrolled ? 'bg-[#F5F0E8]/95 backdrop-blur-md shadow-sm' : 'bg-transparent'
                }`}>
                    <a className="flex items-center gap-2.5 no-underline cursor-pointer" onClick={() => navigateTo('home')}>
                        <div className="w-[38px] h-[38px] bg-[#C9962A] rounded-lg flex items-center justify-center shadow-lg overflow-hidden">
                            <span className="text-white font-bold text-xl">B</span>
                        </div>
                        <span className={`font-playfair text-[22px] font-bold tracking-tight transition-colors duration-300 ${
                            isScrolled ? 'text-[#1A1208]' : 'text-white'
                        }`}>
                            Brush<span className="text-[#C9962A]">d</span>
                        </span>
                    </a>
                    <ul className="hidden md:flex gap-6 list-none items-center">
                        {[
                            { id: 'home', label: 'Home' },
                            { id: 'services', label: 'Services' },
                            { id: 'home', label: 'For Painters', section: 'how' },
                            { id: 'home', label: 'FAQ', section: 'why' },
                            { id: 'quote', label: 'Contact' }
                        ].map((link, index) => (
                            <li key={index}>
                                <a 
                                    onClick={() => navigateTo(link.id, link.section)} 
                                    className={`no-underline text-[14.5px] transition-all duration-300 cursor-pointer font-medium px-4 py-2 rounded-full ${
                                        (currentPage === link.id && (!link.section || link.section === 'home'))
                                            ? (isScrolled ? 'bg-[#C9962A]/10 text-[#C9962A]' : 'bg-black/20 text-white')
                                            : `${isScrolled ? 'text-[#4A3B28]/80' : 'text-white/80'} hover:bg-[#C9962A]/10 hover:text-[#C9962A]`
                                    }`}
                                >
                                    {link.label}
                                </a>
                            </li>
                        ))}
                    </ul>
                    <a onClick={() => navigateTo('quote')} className="hidden md:inline-flex items-center bg-[#C9962A] text-white rounded-lg px-[22px] py-[11px] text-sm font-medium transition-all hover:bg-[#A07A1E] hover:-translate-y-px cursor-pointer">
                        Get Free Quote
                    </a>
                    <button 
                        className={`md:hidden flex flex-col justify-center gap-1.5 w-10 h-10 rounded-lg p-2.5 transition-all duration-300 ${
                            isScrolled ? 'bg-[#C9962A]/10' : 'bg-white/10'
                        }`}
                        onClick={() => setIsMenuOpen(true)}
                    >
                        <span className={`block w-full h-0.5 rounded-sm ${isScrolled ? 'bg-[#C9962A]' : 'bg-white'}`}></span>
                        <span className={`block w-3/4 h-0.5 rounded-sm ${isScrolled ? 'bg-[#C9962A]' : 'bg-white'}`}></span>
                        <span className={`block w-full h-0.5 rounded-sm ${isScrolled ? 'bg-[#C9962A]' : 'bg-white'}`}></span>
                    </button>
                </nav>
            );
        };

        const Home = ({ onNavigate }) => {
            useEffect(() => {
                const els = document.querySelectorAll('.aos');
                const io = new IntersectionObserver((entries) => {
                    entries.forEach((e) => {
                        if (e.isIntersecting) {
                            e.target.classList.add('show');
                            io.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.05 });
                els.forEach((el) => io.observe(el));
                return () => io.disconnect();
            }, []);

            return (
                <div>
                    {/* HERO */}
                    <section className="relative min-h-screen flex flex-col items-center justify-center text-center px-6 overflow-hidden">
                        <div className="hero-bg"></div>
                        <div className="hero-overlay"></div>
                        <div className="relative z-10 max-w-[780px]">
                            <div className="inline-flex items-center gap-2 bg-white/10 border border-white/20 rounded-full px-5 py-2 mb-8 text-[11px] font-semibold tracking-[2px] uppercase backdrop-blur-md text-white">
                                Sydney's #1 Free Painting Quote Service
                            </div>
                            <h1 className="font-playfair text-5xl md:text-8xl font-extrabold text-white leading-[1.05] mb-2 tracking-tight">Free Painting Quotes</h1>
                            <span className="font-playfair text-5xl md:text-8xl font-bold italic text-[#E2B84B] block leading-[1.1] mb-10 tracking-tight">from Sydney's Best</span>
                            <p className="text-lg md:text-xl font-light text-white/90 leading-relaxed max-w-[560px] mx-auto mb-12">Tell us about your painting job. We instantly match you with trusted, vetted local painters. Compare up to 3 quotes and save.</p>
                            <div className="flex gap-4 justify-center flex-wrap mb-12">
                                <a onClick={() => onNavigate('quote')} className="btn-gold px-10 py-4 rounded-lg font-bold text-sm uppercase tracking-widest cursor-pointer">Get Your Free Quote →</a>
                                <a onClick={() => onNavigate('home', 'how')} className="bg-transparent text-white border-2 border-white/40 rounded-lg px-10 py-4 font-medium hover:bg-white/10 transition-all cursor-pointer">How It Works</a>
                            </div>
                        </div>
                    </section>

                    {/* STATS */}
                    <div className="bg-[#C9962A] py-12 px-6">
                        <div className="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                            <div className="aos">
                                <div className="text-white/60 text-2xl mb-2">👤</div>
                                <div className="font-playfair text-4xl font-bold text-white mb-1">500+</div>
                                <div className="text-white/80 text-sm">Painters in Network</div>
                            </div>
                            <div className="aos" style={{transitionDelay:'0.1s'}}>
                                <div className="text-white/60 text-2xl mb-2">📋</div>
                                <div className="font-playfair text-4xl font-bold text-white mb-1">4,800+</div>
                                <div className="text-white/80 text-sm">Quotes Matched</div>
                            </div>
                            <div className="aos" style={{transitionDelay:'0.2s'}}>
                                <div className="text-white/60 text-2xl mb-2">⭐</div>
                                <div className="font-playfair text-4xl font-bold text-white mb-1">4.9★</div>
                                <div className="text-white/80 text-sm">Average Rating</div>
                            </div>
                            <div className="aos" style={{transitionDelay:'0.3s'}}>
                                <div className="text-white/60 text-2xl mb-2">⏱</div>
                                <div className="font-playfair text-4xl font-bold text-white mb-1">&lt; 2hrs</div>
                                <div className="text-white/80 text-sm">Response Time</div>
                            </div>
                        </div>
                    </div>

                    {/* WHY */}
                    <section id="why" className="py-24 px-6 md:px-12 bg-[#F5F0E8]">
                        <div className="max-w-6xl mx-auto">
                            <span className="block text-center text-[#C9962A] font-bold tracking-[3px] uppercase text-xs mb-4">WHY CHOOSE US</span>
                            <h2 className="font-playfair text-4xl md:text-6xl font-bold text-center mb-16">The Smarter Way to Find<br/>a Painter in Sydney</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[
                                    { icon: "💰", title: "100% Free", desc: "Getting quotes through Brushd is completely free. No hidden fees, no catch." },
                                    { icon: "🛡", title: "Vetted Painters", desc: "Every painter in our network is verified, insured, and has passed our quality checks." },
                                    { icon: "📊", title: "Compare Quotes", desc: "Receive up to 3 competitive quotes from local painters. Compare and save." }
                                ].map((item, i) => (
                                    <div key={i} className="aos bg-white p-10 rounded-2xl border border-gold/10 shadow-sm hover:shadow-xl transition-all">
                                        <div className="text-4xl mb-6">{item.icon}</div>
                                        <h3 className="text-xl font-bold mb-4">{item.title}</h3>
                                        <p className="text-[#7A6B54] leading-relaxed">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* HOW */}
                    <section id="how" className="py-24 px-6 md:px-12 bg-[#EDE6D6]">
                        <div className="max-w-5xl mx-auto">
                            <span className="block text-center text-[#C9962A] font-bold tracking-[3px] uppercase text-xs mb-4">HOW IT WORKS</span>
                            <h2 className="font-playfair text-4xl md:text-6xl font-bold text-center mb-20">3 Simple Steps</h2>
                            <div className="space-y-32">
                                {[
                                    { num: "01", title: "Tell Us About Your Job", text: "Fill in our simple 2-minute online form. Select your service type and suburb.", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800&q=80" },
                                    { num: "02", title: "Get Matched Instantly", text: "We notify vetted local painters who specialise in your job. They review and quote.", img: "https://images.unsplash.com/photo-1562259949-e8e7689d7828?w=800&q=80" },
                                    { num: "03", title: "Compare & Choose", text: "Receive multiple quotes directly. Compare prices and reviews, then choose.", img: "https://images.unsplash.com/photo-1595814433015-e6f5cd69614e?w=800&q=80" }
                                ].map((step, i) => (
                                    <div key={i} className={`flex flex-col md:flex-row items-center gap-16 aos ${i % 2 !== 0 ? 'md:flex-row-reverse' : ''}`}>
                                        <div className="flex-1">
                                            <div className="font-playfair text-8xl font-bold text-[#C9962A]/20 mb-4">{step.num}</div>
                                            <h3 className="font-playfair text-3xl font-bold mb-6">{step.title}</h3>
                                            <p className="text-lg text-[#7A6B54] leading-relaxed">{step.text}</p>
                                        </div>
                                        <div className="flex-1 rounded-2xl overflow-hidden shadow-2xl">
                                            <img src={step.img} className="w-full h-full object-cover aspect-video" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const QuoteForm = ({ onNavigate }) => {
            const [step, setStep] = useState('service');
            const [formData, setFormData] = useState({
                serviceType: '',
                propertyType: '',
                suburb: '',
                name: '',
                email: '',
                phone: ''
            });

            const renderStep = () => {
                if (step === 'service') {
                    return (
                        <div className="space-y-8">
                            <h2 className="font-playfair text-3xl font-bold text-center">What do you need painted?</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {['Interior Painting', 'Exterior Painting', 'Commercial Painting', 'Roof Painting'].map(type => (
                                    <button 
                                        key={type}
                                        onClick={() => { setFormData({...formData, serviceType: type}); setStep('property'); }}
                                        className="p-6 border-2 border-gold/10 rounded-xl hover:border-gold transition-all bg-white font-bold text-left"
                                    >
                                        {type}
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                }
                if (step === 'property') {
                    return (
                        <div className="space-y-8">
                            <h2 className="font-playfair text-3xl font-bold text-center">Property Type</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {['House', 'Apartment', 'Commercial', 'Other'].map(type => (
                                    <button 
                                        key={type}
                                        onClick={() => { setFormData({...formData, propertyType: type}); setStep('details'); }}
                                        className="p-6 border-2 border-gold/10 rounded-xl hover:border-gold transition-all bg-white font-bold text-left"
                                    >
                                        {type}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setStep('service')} className="text-gold font-bold">← Back</button>
                        </div>
                    );
                }
                if (step === 'details') {
                    return (
                        <div className="space-y-8">
                            <h2 className="font-playfair text-3xl font-bold text-center">Contact Details</h2>
                            <div className="space-y-4">
                                <input 
                                    type="text" placeholder="Your Name" 
                                    className="w-full p-4 rounded-xl border-2 border-gold/10 focus:border-gold outline-none"
                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                />
                                <input 
                                    type="text" placeholder="Suburb" 
                                    className="w-full p-4 rounded-xl border-2 border-gold/10 focus:border-gold outline-none"
                                    onChange={(e) => setFormData({...formData, suburb: e.target.value})}
                                />
                                <input 
                                    type="email" placeholder="Email" 
                                    className="w-full p-4 rounded-xl border-2 border-gold/10 focus:border-gold outline-none"
                                    onChange={(e) => setFormData({...formData, email: e.target.value})}
                                />
                            </div>
                            <button 
                                onClick={() => setStep('success')}
                                className="w-full btn-gold p-4 rounded-xl font-bold"
                            >
                                Get Free Quotes
                            </button>
                        </div>
                    );
                }
                if (step === 'success') {
                    return (
                        <div className="text-center py-12">
                            <div className="text-6xl mb-8">✅</div>
                            <h2 className="font-playfair text-4xl font-bold mb-4">Request Received!</h2>
                            <p className="text-lg text-[#7A6B54] mb-12">We've received your request. Up to 3 painters will contact you shortly.</p>
                            <button onClick={() => onNavigate('home')} className="btn-gold px-10 py-4 rounded-xl font-bold">Back to Home</button>
                        </div>
                    );
                }
            };

            return (
                <div className="min-h-screen pt-32 pb-24 px-6 flex items-center justify-center">
                    <div className="max-w-2xl w-full bg-white p-12 rounded-3xl shadow-2xl border border-gold/10">
                        {renderStep()}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navigateTo = (page, sectionId) => {
                setCurrentPage(page);
                setIsMenuOpen(false);
                if (sectionId) {
                    setTimeout(() => {
                        const el = document.getElementById(sectionId);
                        if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
                    }, 100);
                } else {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            return (
                <div className="min-h-screen">
                    <Navbar 
                        isScrolled={isScrolled} 
                        navigateTo={navigateTo} 
                        currentPage={currentPage} 
                        setIsMenuOpen={setIsMenuOpen} 
                    />
                    
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[9999] bg-black/50 backdrop-blur-sm" onClick={() => setIsMenuOpen(false)}>
                            <div className="bg-[#F5F0E8] w-full p-8 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-playfair text-2xl font-bold">Brush<span className="text-[#C9962A]">d</span></span>
                                    <button onClick={() => setIsMenuOpen(false)} className="text-3xl">✕</button>
                                </div>
                                <div className="flex flex-col gap-6 text-xl font-bold">
                                    <a onClick={() => navigateTo('home')}>Home</a>
                                    <a onClick={() => navigateTo('services')}>Services</a>
                                    <a onClick={() => navigateTo('quote')} className="text-[#C9962A]">Get Free Quote</a>
                                </div>
                            </div>
                        </div>
                    )}

                    <main>
                        {currentPage === 'home' ? <Home onNavigate={navigateTo} /> : <QuoteForm onNavigate={navigateTo} />}
                    </main>

                    <footer className="bg-[#2A1F0E] text-white/60 py-20 px-6 md:px-12">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 border-b border-white/10 pb-12 mb-12">
                            <div className="col-span-1 md:col-span-2">
                                <span className="font-playfair text-3xl font-bold text-white mb-6 block">Brush<span className="text-[#C9962A]">d</span></span>
                                <p className="max-w-sm leading-relaxed">Sydney's leading platform for connecting homeowners with vetted, professional local painters. Fast, free, and reliable.</p>
                            </div>
                            <div>
                                <h4 className="text-white font-bold mb-6">Quick Links</h4>
                                <div className="flex flex-col gap-4">
                                    <a onClick={() => navigateTo('home')} className="hover:text-[#C9962A] cursor-pointer">Home</a>
                                    <a onClick={() => navigateTo('services')} className="hover:text-[#C9962A] cursor-pointer">Services</a>
                                    <a onClick={() => navigateTo('quote')} className="hover:text-[#C9962A] cursor-pointer">Get Quote</a>
                                </div>
                            </div>
                            <div>
                                <h4 className="text-white font-bold mb-6">Contact</h4>
                                <p>Sydney, NSW, Australia</p>
                                <p>hello@brushd.com.au</p>
                            </div>
                        </div>
                        <div className="max-w-6xl mx-auto text-sm">
                            © 2026 Brushd Painting Quotes. All rights reserved.
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
